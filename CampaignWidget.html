<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Campaign Lookup</title>
  <style>
    :host { display: block; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .widget {
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      padding: 8px 12px;
      font-size: 13px;
      min-width: 280px;
    }
    h3 { margin: 0 0 8px 0; font-size: 14px; color: #1a73e8; }
    .field { margin-bottom: 8px; }
    .label { font-size: 12px; color: #555; }
    .value { font-weight: 600; }
    .yes { color: #34a853; }
    .no { color: #ea4335; }
    .loading, .error { font-style: italic; color: #666; }
  </style>
</head>
<body>
  <div class="widget" id="root">
    <h3>📋 Campaign Lookup</h3>
    <div id="content">Waiting for preview contact...</div>
  </div>

  <script>
    // ================== CONFIGURATION ==================
    const API_ENDPOINT = 'api.airtable.com/v0/appPmucupoffk2wmY';        // ←←← CHANGE THIS
    const BEARER_TOKEN = 'patYqdB2ZUbYN9aCP.b3a72fd1165c7d269f81e802503859e13792dbd095447b34f3c60957ecbc68e8';

    class CampaignWidget extends HTMLElement {
      constructor() {
        super();
        this.lastPhone = null;
      }

      connectedCallback() {
        console.log('✅ CampaignWidget connected to header');
        this.pollForDNIS();
      }

      getCurrentDNIS() {
        return window.$STORE?.agentContact?.dnis
            || window.$STORE?.agentContact?.interaction?.dnis
            || null;
      }

      async performLookup(phone) {
        if (!phone || phone === this.lastPhone) return;
        this.lastPhone = phone;

        const content = this.querySelector('#content');
        content.innerHTML = '🔍 Looking up in Airtable...';

        try {
          const payload = { inputs: { phoneNumber: phone } };

          const headers = { 'Content-Type': 'application/json' };
          if (BEARER_TOKEN) {
            headers['Authorization'] = `Bearer ${BEARER_TOKEN}`;
          }

          const response = await fetch(API_ENDPOINT, {
            method: 'POST',
            headers: headers,
            body: JSON.stringify(payload)
          });

          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          const result = await response.json();

          const isToday = result.isContactedToday === true;
          const dateDisplay = result.lastContactDate 
            ? result.lastContactDate 
            : '<span style="color:#999">Never contacted</span>';

          content.innerHTML = `
            <div class="field"><div class="label">Last Contact Date</div><div class="value">${dateDisplay}</div></div>
            <div class="field"><div class="label">Contacted Today</div><div class="value ${isToday ? 'yes' : 'no'}">${isToday ? '✅ YES' : '❌ NO'}</div></div>
          `;
        } catch (err) {
          console.error(err);
          content.innerHTML = `<div class="error">⚠️ Lookup failed – check console</div>`;
        }
      }

      pollForDNIS() {
        setInterval(() => {
          const dnis = this.getCurrentDNIS();
          if (dnis) this.performLookup(dnis);
        }, 1200);
      }
    }

    // Register as a proper Web Component
