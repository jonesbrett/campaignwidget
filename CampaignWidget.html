<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Campaign Lookup</title>
  <style>
    :host { display: block; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .widget { background: white; border-radius: 8px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); font-size: 13px; }
    h3 { margin: 0 0 10px 0; color: #1a73e8; }
    .field { margin-bottom: 10px; }
    .label { font-size: 12px; color: #555; }
    .value { font-weight: 600; }
    .yes { color: #34a853; }
    .no { color: #ea4335; }
  </style>
</head>
<body>
  <div class="widget">
    <h3>📋 Campaign Lookup</h3>
    <div id="content">Waiting for preview contact...</div>
  </div>

  <script>
    const API_ENDPOINT = 'api.airtable.com/v0/appPmucupoffk2wmY';   // ← change this
    const BEARER_TOKEN = 'patYqdB2ZUbYN9aCP.b3a72fd1165c7d269f81e802503859e13792dbd095447b34f3c60957ecbc68e8';

    class CampaignWidget extends HTMLElement {
      constructor() { super(); this.lastPhone = null; }

      connectedCallback() {
        console.log('✅ Campaign Lookup widget loaded in Auxiliary pane');
        this.startPolling();
      }

      getDNIS() {
        return window.$STORE?.agentContact?.dnis || window.$STORE?.agentContact?.interaction?.dnis || null;
      }

      async lookup(phone) {
        if (!phone || phone === this.lastPhone) return;
        this.lastPhone = phone;

        const content = this.querySelector('#content');
        content.innerHTML = '🔍 Looking up...';

        try {
          const res = await fetch(API_ENDPOINT, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${BEARER_TOKEN}`
            },
            body: JSON.stringify({ inputs: { phoneNumber: phone } })
          });

          const data = await res.json();

          const isToday = data.isContactedToday === true;
          const date = data.lastContactDate || '<span style="color:#999">Never contacted</span>';

          content.innerHTML = `
            <div class="field"><span class="label">Last Contact Date</span><br><span class="value">${date}</span></div>
            <div class="field"><span class="label">Contacted Today</span><br><span class="value ${isToday ? 'yes' : 'no'}">${isToday ? '✅ YES' : '❌ NO'}</span></div>
          `;
        } catch (e) {
          console.error(e);
          content.innerHTML = '⚠️ Lookup failed';
        }
      }

      startPolling() {
        setInterval(() => {
          const dnis = this.getDNIS();
          if (dnis) this.lookup(dnis);
        }, 1000);
      }
    }

    customElements.define('campaign-widget', CampaignWidget);
  </script>
</body>
</html>
